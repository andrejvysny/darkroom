name: release
on:
  push:
    tags: ["v*", "beta-*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, e.g. v0.1.1 or beta-1.1"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              platform: macos-15,
              rustTargets: "aarch64-apple-darwin",
              args: "--target aarch64-apple-darwin --bundles dmg",
            }
          - {
              platform: macos-15-intel,
              rustTargets: "x86_64-apple-darwin",
              args: "--target x86_64-apple-darwin --bundles dmg",
            }
          - {
              platform: windows-latest,
              rustTargets: "",
              args: "--bundles nsis",
            }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");

          const tag = process.env.RELEASE_TAG ?? "";
          const versionTag = tag.match(/^v(\d+\.\d+\.\d+)$/);
          const betaTag = tag.match(/^beta-(\d+)\.(\d+)$/);

          if (!versionTag && !betaTag) {
            console.error(`Release tag must match vX.Y.Z or beta-X.Y, got "${tag}".`);
            process.exit(1);
          }

          function readJsonVersion(path) {
            return JSON.parse(fs.readFileSync(path, "utf8")).version;
          }

          function readTomlVersion(path, section) {
            const lines = fs.readFileSync(path, "utf8").split(/\r?\n/);
            let active = false;

            for (const line of lines) {
              const header = line.match(/^\s*\[([^\]]+)\]\s*$/);
              if (header) {
                active = header[1] === section;
                continue;
              }

              if (!active) {
                continue;
              }

              const version = line.match(/^\s*version\s*=\s*"([^"]+)"/);
              if (version) {
                return version[1];
              }
            }

            throw new Error(`Missing version in [${section}] of ${path}`);
          }

          // Pre-1.0 beta scheme: a `beta-X.Y` tag maps to app version `0.X.Y`, so beta releases
          // ride the project's 0.x patch line (e.g. beta-1.1 -> 0.1.1) rather than forcing a major.
          const expected = versionTag ? versionTag[1] : `0.${betaTag[1]}.${betaTag[2]}`;
          const versions = {
            "package.json": readJsonVersion("package.json"),
            "src-tauri/tauri.conf.json": readJsonVersion("src-tauri/tauri.conf.json"),
            "Cargo.toml [workspace.package]": readTomlVersion("Cargo.toml", "workspace.package"),
            "src-tauri/Cargo.toml [package]": readTomlVersion("src-tauri/Cargo.toml", "package"),
          };

          const mismatches = Object.entries(versions).filter(([, version]) => version !== expected);
          if (mismatches.length > 0) {
            console.error(`Release tag ${tag} requires version ${expected}.`);
            for (const [source, version] of mismatches) {
              console.error(`${source}: ${version}`);
            }
            process.exit(1);
          }
          NODE

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install frontend deps
        run: npm ci

      # tauri-action runs beforeBuildCommand (npm run build), bundles, and uploads to the release.
      # Pinned from tauri-apps/tauri-action v0.6.2.
      - name: Build app + create release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tauriScript: npm run tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Darkroom ${{ env.RELEASE_TAG }}"
          releaseBody: |
            Release artifacts:
            - macOS Apple Silicon and Intel DMGs are ad-hoc signed and not notarized.
            - Intel macOS build ships with AI analysis disabled because ONNX Runtime has no x86_64 macOS prebuilt for the pinned ort runtime.
            - Windows x64 NSIS installer is unsigned.
          # Publish beta-* tags directly as pre-releases; keep stable v* tags as drafts for review.
          releaseDraft: ${{ !startsWith(env.RELEASE_TAG, 'beta-') }}
          prerelease: true
